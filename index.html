<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hafland Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #000000; --border: #f0f0f0; --glass: rgba(255, 255, 255, 0.98); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; height: 100vh; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        .glass-nav {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border);
            z-index: 100; position: fixed; bottom: 0; left: 0; right: 0;
            height: calc(85px + env(safe-area-inset-bottom)); display: flex; justify-content: space-around; align-items: flex-start;
            padding-top: 15px; padding-bottom: env(safe-area-inset-bottom); pointer-events: auto;
        }

        .content-scroll { height: calc(100vh - 170px); overflow-y: auto; position: relative; z-index: 10; padding-bottom: 140px; }
        .content-scroll::-webkit-scrollbar { display: none; }
        
        .btn-black { background: #000; color: #fff; transition: all 0.2s ease; }
        .btn-black:active { transform: scale(0.96); }
        
        input { outline: none; user-select: text !important; color: #000; background: transparent; }
        .msg-me { background: #000; color: #fff; border-radius: 20px 20px 4px 20px; }
        .msg-them { background: #f3f4f6; color: #000; border-radius: 20px 20px 20px 4px; }
        
        .nft-preview { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 12px; }
        .status-video { width: 100%; border-radius: 20px; background: #000; margin-bottom: 20px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10000; display: flex; align-items: flex-end; justify-content: center; }
        .modal-content { background: white; width: 100%; max-width: 500px; border-radius: 32px 32px 0 0; padding: 32px; max-height: 80vh; overflow-y: auto; }

        #call-screen { 
            position: fixed; inset: 0; background: #000; z-index: 20000; 
            display: none; flex-direction: column; align-items: center; justify-content: center; color: white;
            pointer-events: none;
        }
        #call-screen.active { display: flex; pointer-events: auto; }
        #remote-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
        #local-video { position: absolute; top: 60px; right: 20px; width: 100px; height: 150px; border-radius: 12px; object-fit: cover; border: 2px solid white; z-index: 20001; }
    </style>
</head>
<body>
    <div id="app" class="h-full flex flex-col relative bg-white">
        <div class="h-full flex items-center justify-center">
            <div class="w-10 h-10 border-4 border-gray-100 border-t-black rounded-full animate-spin"></div>
        </div>
    </div>

    <!-- Call Screen -->
    <div id="call-screen">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay playsinline muted></video>
        <div class="absolute bottom-20 flex gap-8 z-[20002]">
            <button onclick="endCall()" class="w-20 h-20 bg-red-500 rounded-full flex items-center justify-center shadow-2xl"><i data-lucide="phone-off" color="white" size="32"></i></button>
        </div>
        <div id="call-info" class="absolute top-1/2 -translate-y-1/2 text-center z-[20002]">
            <h2 id="call-user-name" class="text-3xl font-black uppercase italic mb-2">Звонок...</h2>
            <p id="call-status" class="text-sm font-bold opacity-50 uppercase tracking-widest">Соединение</p>
        </div>
    </div>

    <!-- NFT/Transfer Modal -->
    <div id="action-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h3 id="action-title" class="text-xl font-black uppercase italic">Выберите получателя</h3>
                <button onclick="closeActionModal()" class="p-3 bg-gray-100 rounded-full"><i data-lucide="x" size="20"></i></button>
            </div>
            <div id="recipient-list" class="space-y-4"></div>
        </div>
    </div>

    <!-- Incoming Call Modal -->
    <div id="incoming-modal" class="modal-overlay hidden">
        <div class="modal-content text-center">
            <div class="w-20 h-20 bg-black rounded-3xl mx-auto mb-6 flex items-center justify-center"><i data-lucide="phone-incoming" color="white" size="32"></i></div>
            <h3 id="incoming-name" class="text-2xl font-black uppercase italic mb-2">Кто-то звонит</h3>
            <div class="flex gap-4">
                <button onclick="declineCall()" class="flex-1 p-6 bg-gray-100 rounded-3xl text-xs font-black uppercase">Отклонить</button>
                <button onclick="acceptCall()" class="flex-1 p-6 bg-black text-white rounded-3xl text-xs font-black uppercase">Принять</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkgC4melkEcj0pDywonPG3aAeE3vACoF0",
            authDomain: "hafland-c8dc3.firebaseapp.com",
            projectId: "hafland-c8dc3",
            storageBucket: "hafland-c8dc3.firebasestorage.app",
            messagingSenderId: "163991622474",
            appId: "1:163991622474:web:06a7357e295c9a98b327b3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const APP_ID = "hafland_v12_final";

        let pc;
        let localStream;
        let activeCallDoc = null;

        window.state = {
            user: null, profile: null, tab: 'chats', chatMode: null,
            messages: [], users: [], statuses: [], 
            pendingNftImg: null, actionType: null
        };

        onAuthStateChanged(auth, async (u) => {
            if (u) {
                window.state.user = u;
                initListeners(u.uid);
            } else {
                renderAuth();
            }
        });

        function initListeners(uid) {
            onSnapshot(doc(db, 'artifacts', APP_ID, 'users', uid), (s) => {
                if (s.exists()) { window.state.profile = s.data(); render(); }
                else { renderAuth(); }
            });
            onSnapshot(collection(db, 'artifacts', APP_ID, 'users'), (s) => {
                window.state.users = s.docs.map(d => d.data());
                render();
            });
            onSnapshot(collection(db, 'artifacts', APP_ID, 'messages'), (s) => {
                window.state.messages = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => a.time - b.time);
                render();
            });
            onSnapshot(collection(db, 'artifacts', APP_ID, 'statuses'), (s) => {
                window.state.statuses = s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.time - a.time);
                render();
            });
            onSnapshot(collection(db, 'artifacts', APP_ID, 'calls'), (s) => {
                s.docChanges().forEach(change => {
                    const data = change.doc.data();
                    if (change.type === 'added' && data.to === uid && data.status === 'dialing') {
                        showIncomingCall(change.doc.id, data);
                    }
                    if (activeCallDoc && change.doc.id === activeCallDoc && data.status === 'ended') {
                        cleanupCall();
                    }
                });
            });
        }

        // --- AUTH ---
        window.handleAuth = async (mode) => {
            const nick = document.getElementById('a-nick').value.trim().toLowerCase();
            const pass = document.getElementById('a-pass').value.trim();
            if(!nick || !pass) return;

            const regRef = doc(db, 'artifacts', APP_ID, 'registry', nick);
            try {
                const regSnap = await getDoc(regRef);
                if(mode === 'reg') {
                    if(regSnap.exists()) return alert("Ник занят");
                    await signOut(auth);
                    const cred = await signInAnonymously(auth);
                    const isAdmin = nick === 'hafa168';
                    const profile = { uid: cred.user.uid, username: nick, pass: pass, stars: isAdmin ? 999999 : 0, tag: isAdmin?'ADMIN':'USER', nfts: [] };
                    await setDoc(regRef, { uid: cred.user.uid, pass });
                    await setDoc(doc(db, 'artifacts', APP_ID, 'users', cred.user.uid), profile);
                } else {
                    if(!regSnap.exists() || regSnap.data().pass !== pass) return alert("Неверные данные");
                    await signOut(auth);
                    await signInAnonymously(auth);
                    // Firestore listener handles the rest
                }
            } catch(e) { alert("Ошибка"); }
        };

        // --- CALLS ---
        window.startCall = async (type) => {
            const toUid = window.state.chatMode;
            const toUser = window.state.users.find(u => u.uid === toUid);
            document.getElementById('call-user-name').innerText = toUser.username;
            document.getElementById('call-screen').classList.add('active');
            
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: type === 'video' });
            document.getElementById('local-video').srcObject = localStream;

            const callRef = await addDoc(collection(db, 'artifacts', APP_ID, 'calls'), {
                from: window.state.user.uid, fromName: window.state.profile.username,
                to: toUid, type: type, status: 'dialing', time: Date.now()
            });
            activeCallDoc = callRef.id;

            setupPeer();
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await updateDoc(doc(db, 'artifacts', APP_ID, 'calls', activeCallDoc), { offer: { type: offer.type, sdp: offer.sdp } });

            onSnapshot(doc(db, 'artifacts', APP_ID, 'calls', activeCallDoc), async (s) => {
                const data = s.data();
                if (data?.answer && !pc.currentRemoteDescription) {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                    document.getElementById('call-status').innerText = 'В ЭФИРЕ';
                }
            });
        };

        function setupPeer() {
            pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            pc.ontrack = (e) => { document.getElementById('remote-video').srcObject = e.streams[0]; document.getElementById('call-info').classList.add('hidden'); };
            pc.onicecandidate = (e) => { if (e.candidate && activeCallDoc) addDoc(collection(db, 'artifacts', APP_ID, 'calls', activeCallDoc, 'candidates'), e.candidate.toJSON()); };
        }

        function showIncomingCall(id, data) {
            activeCallDoc = id;
            document.getElementById('incoming-name').innerText = data.fromName;
            document.getElementById('incoming-modal').classList.remove('hidden');
        }

        window.acceptCall = async () => {
            document.getElementById('incoming-modal').classList.add('hidden');
            document.getElementById('call-screen').classList.add('active');
            const s = await getDoc(doc(db, 'artifacts', APP_ID, 'calls', activeCallDoc));
            const data = s.data();
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: data.type === 'video' });
            document.getElementById('local-video').srcObject = localStream;
            setupPeer();
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await updateDoc(doc(db, 'artifacts', APP_ID, 'calls', activeCallDoc), { answer: { type: answer.type, sdp: answer.sdp }, status: 'active' });
        }

        window.endCall = async () => { if (activeCallDoc) await updateDoc(doc(db, 'artifacts', APP_ID, 'calls', activeCallDoc), { status: 'ended' }); cleanupCall(); };
        window.declineCall = async () => { if (activeCallDoc) await updateDoc(doc(db, 'artifacts', APP_ID, 'calls', activeCallDoc), { status: 'ended' }); cleanupCall(); };

        function cleanupCall() {
            if (localStream) localStream.getTracks().forEach(t => t.stop());
            if (pc) pc.close();
            document.getElementById('call-screen').classList.remove('active');
            document.getElementById('incoming-modal').classList.add('hidden');
            document.getElementById('call-info').classList.remove('hidden');
            activeCallDoc = null;
        }

        // --- MARKET & ACTIONS ---
        window.buyItem = (type) => {
            if(type === 'transfer') {
                window.state.actionType = 'transfer';
                openActionModal("Передать звезды");
            } else if(type === 'nft') {
                const f = document.createElement('input'); f.type='file'; f.accept='image/*';
                f.onchange = (e) => {
                    const r = new FileReader();
                    r.onload = () => { window.state.pendingNftImg = r.result; window.state.actionType = 'nft'; openActionModal("Кому подарить NFT?"); };
                    r.readAsDataURL(e.target.files[0]);
                };
                f.click();
            } else if(type === 'premium') {
                if(window.state.profile.stars < 1000) return alert("Мало звезд");
                updateDoc(doc(db, 'artifacts', APP_ID, 'users', window.state.user.uid), { stars: window.state.profile.stars - 1000, tag: 'PREMIUM' });
                alert("Premium куплен!");
            }
        };

        window.openActionModal = (title) => {
            document.getElementById('action-title').innerText = title;
            const list = document.getElementById('recipient-list');
            list.innerHTML = window.state.users.map(u => `
                <button onclick="executeAction('${u.uid}')" class="w-full flex items-center justify-between p-6 bg-gray-50 rounded-3xl font-black uppercase text-sm">
                    ${u.username} ${u.uid === window.state.user.uid ? '(Вам)' : ''}
                    <i data-lucide="chevron-right" size="18"></i>
                </button>`).join('');
            document.getElementById('action-modal').classList.remove('hidden');
            lucide.createIcons();
        };

        window.closeActionModal = () => { document.getElementById('action-modal').classList.add('hidden'); };

        window.executeAction = async (targetUid) => {
            if(window.state.actionType === 'transfer') {
                const amount = parseInt(prompt("Сколько звезд передать?"));
                if(!amount || amount <= 0 || window.state.profile.stars < amount) return alert("Ошибка суммы");
                await updateDoc(doc(db, 'artifacts', APP_ID, 'users', window.state.user.uid), { stars: window.state.profile.stars - amount });
                const target = window.state.users.find(u => u.uid === targetUid);
                await updateDoc(doc(db, 'artifacts', APP_ID, 'users', targetUid), { stars: (target.stars || 0) + amount });
                alert("Звезды переданы!");
            } else if(window.state.actionType === 'nft') {
                if(window.state.profile.stars < 500) return alert("Нужно 500 звезд");
                await updateDoc(doc(db, 'artifacts', APP_ID, 'users', window.state.user.uid), { stars: window.state.profile.stars - 500 });
                await updateDoc(doc(db, 'artifacts', APP_ID, 'users', targetUid), { nfts: arrayUnion({ img: window.state.pendingNftImg, from: window.state.profile.username }) });
                alert("NFT отправлено!");
            }
            closeActionModal();
        };

        // --- FEED ---
        window.postStatus = async () => {
            if(window.state.profile.tag !== 'PREMIUM' && window.state.profile.username !== 'hafa168') return alert("Нужен Premium");
            const f = document.createElement('input'); f.type = 'file'; f.accept = 'video/*';
            f.onchange = (e) => {
                const file = e.target.files[0];
                const video = document.createElement('video');
                video.preload = 'metadata';
                video.onloadedmetadata = () => {
                    if (video.duration > 300) return alert("Максимум 5 минут!");
                    const r = new FileReader();
                    r.onload = async () => {
                        await addDoc(collection(db, 'artifacts', APP_ID, 'statuses'), { sender: window.state.profile.username, video: r.result, time: Date.now() });
                        alert("Готово!");
                    };
                    r.readAsDataURL(file);
                };
                video.src = URL.createObjectURL(file);
            };
            f.click();
        };

        // --- RENDERING ---
        window.sendMsg = async () => {
            const i = document.getElementById('msg-input');
            if(!i?.value.trim() || !window.state.chatMode) return;
            await addDoc(collection(db, 'artifacts', APP_ID, 'messages'), {
                from: window.state.user.uid, to: window.state.chatMode, text: i.value,
                sender: window.state.profile.username, time: Date.now()
            });
            i.value = '';
        };

        window.changeTab = (t) => { window.state.tab = t; window.state.chatMode = null; render(); };

        function renderAuth() {
            document.getElementById('app').innerHTML = `
                <div class="h-full flex flex-col items-center justify-center p-8 bg-white">
                    <h1 class="text-5xl font-black italic uppercase mb-12 tracking-tighter">Hafland</h1>
                    <div class="w-full max-w-xs space-y-4">
                        <input id="a-nick" type="text" class="w-full p-6 rounded-[2rem] border-2 border-gray-50 text-center font-bold" placeholder="ЛОГИН">
                        <input id="a-pass" type="password" class="w-full p-6 rounded-[2rem] border-2 border-gray-50 text-center font-bold" placeholder="ПАРОЛЬ">
                        <button onclick="handleAuth('login')" class="w-full p-6 border-2 border-black rounded-[2rem] font-black uppercase text-sm">Вход</button>
                        <button onclick="handleAuth('reg')" class="w-full p-6 bg-black text-white rounded-[2rem] font-black uppercase text-sm">Создать</button>
                    </div>
                </div>`;
            lucide.createIcons();
        }

        function render() {
            const s = window.state; if(!s.profile) return;
            document.getElementById('app').innerHTML = `
                <header class="pt-16 px-8 pb-6 flex justify-between items-end border-b border-gray-100 bg-white">
                    <div>
                        <h2 class="text-2xl font-black italic uppercase tracking-tighter">Hafland</h2>
                        <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mt-0.5">${s.chatMode ? 'Чат' : s.tab}</p>
                    </div>
                    <div class="flex items-center gap-2 px-4 py-2 rounded-full border border-gray-100">
                        <span class="text-[11px] font-black">${s.profile.stars.toLocaleString()}</span>
                        <i data-lucide="zap" size="10" class="fill-black"></i>
                    </div>
                </header>
                <main class="content-scroll bg-white">${renderPage()}</main>
                <nav class="glass-nav">
                    <button onclick="changeTab('chats')" class="flex-1 flex flex-col items-center"><i data-lucide="message-square" size="24" class="${s.tab==='chats'?'text-black':'text-gray-300'}"></i></button>
                    <button onclick="changeTab('feed')" class="flex-1 flex flex-col items-center"><i data-lucide="layers" size="24" class="${s.tab==='feed'?'text-black':'text-gray-300'}"></i></button>
                    <button onclick="changeTab('market')" class="flex-1 flex flex-col items-center"><i data-lucide="shopping-cart" size="24" class="${s.tab==='market'?'text-black':'text-gray-300'}"></i></button>
                    <button onclick="changeTab('profile')" class="flex-1 flex flex-col items-center"><i data-lucide="user" size="24" class="${s.tab==='profile'?'text-black':'text-gray-300'}"></i></button>
                </nav>
            `;
            lucide.createIcons();
            const box = document.getElementById('chat-box'); if(box) box.scrollTop = box.scrollHeight;
        }

        function renderPage() {
            const s = window.state;
            if(s.tab === 'chats') {
                if(s.chatMode) {
                    const filtered = s.messages.filter(m => (m.from===s.user.uid && m.to===s.chatMode) || (m.from===s.chatMode && m.to===s.user.uid));
                    return `<div class="h-full flex flex-col px-8">
                        <div class="flex justify-between items-center py-4 border-b border-gray-50">
                            <button onclick="window.state.chatMode=null;render()" class="text-[10px] font-black text-gray-400 uppercase">Назад</button>
                            <div class="flex gap-4">
                                <button onclick="startCall('audio')" class="p-3 bg-gray-50 rounded-2xl"><i data-lucide="phone" size="18"></i></button>
                                <button onclick="startCall('video')" class="p-3 bg-black rounded-2xl"><i data-lucide="video" color="white" size="18"></i></button>
                            </div>
                        </div>
                        <div id="chat-box" class="flex-1 overflow-y-auto space-y-4 py-6">
                            ${filtered.map(m => `<div class="flex ${m.from===s.user.uid?'justify-end':'justify-start'}"><div class="max-w-[85%]"><div class="${m.from===s.user.uid?'msg-me':'msg-them'} p-5 text-sm">${m.text}</div></div></div>`).join('')}
                        </div>
                        <div class="py-6 flex gap-3"><input id="msg-input" class="flex-1 border-2 border-gray-50 p-5 rounded-3xl text-sm" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMsg()"><button onclick="sendMsg()" class="btn-black w-14 h-14 rounded-3xl flex items-center justify-center"><i data-lucide="send" size="20"></i></button></div>
                    </div>`;
                }
                return `<div class="p-8 space-y-4">
                    ${s.users.filter(u=>u.uid!==s.user.uid).map(u => `<button onclick="window.state.chatMode='${u.uid}';render()" class="w-full flex items-center gap-5 p-6 rounded-[2rem] border-2 border-gray-50"><div class="w-14 h-14 bg-black rounded-2xl flex items-center justify-center font-black text-white text-xl">${u.username[0].toUpperCase()}</div><div class="text-left flex-1 font-black uppercase text-sm">${u.username}</div></button>`).join('')}
                </div>`;
            }
            if(s.tab === 'feed') {
                return `<div class="p-8">
                    <button onclick="postStatus()" class="w-full p-8 mb-10 border-2 border-dashed border-gray-100 rounded-[2.5rem] text-xs font-black uppercase text-gray-300">+ Загрузить видео (5 мин)</button>
                    ${s.statuses.map(st => `<div class="mb-12"><p class="text-[11px] font-black uppercase italic mb-4">${st.sender}</p><video src="${st.video}" class="status-video shadow-2xl" controls></video></div>`).join('')}
                </div>`;
            }
            if(s.tab === 'market') {
                return `<div class="p-8 space-y-4">
                    <div class="p-10 rounded-[3rem] bg-black text-white">
                        <p class="text-[10px] font-black uppercase opacity-40 mb-8">Store</p>
                        <div class="space-y-6">
                            <div class="flex justify-between items-center"><p class="font-black uppercase">Premium</p><button onclick="buyItem('premium')" class="px-6 py-3 bg-white text-black rounded-2xl font-black text-xs">1000 Z</button></div>
                            <div class="flex justify-between items-center"><p class="font-black uppercase">Создать NFT</p><button onclick="buyItem('nft')" class="px-6 py-3 bg-white text-black rounded-2xl font-black text-xs">500 Z</button></div>
                            <div class="flex justify-between items-center"><p class="font-black uppercase">Передать звезды</p><button onclick="buyItem('transfer')" class="px-6 py-3 bg-white text-black rounded-2xl font-black text-xs">Free</button></div>
                        </div>
                    </div>
                </div>`;
            }
            if(s.tab === 'profile') {
                return `<div class="p-8 flex flex-col items-center">
                    <div class="w-28 h-28 rounded-[3rem] border-4 border-gray-50 flex items-center justify-center text-4xl font-black mb-8 bg-gray-50/50">${s.profile.username[0].toUpperCase()}</div>
                    <h2 class="text-3xl font-black italic uppercase">${s.profile.username}</h2>
                    <p class="text-[11px] font-black text-gray-300 uppercase mt-2 tracking-widest">${s.profile.tag}</p>
                    <div class="w-full mt-12 grid grid-cols-3 gap-2">
                        ${(s.profile.nfts || []).map(n => `<img src="${n.img}" class="nft-preview border border-gray-100">`).join('')}
                    </div>
                </div>`;
            }
            return '';
        }
    </script>
</body>
</html>
